name: Refresh data sources

# Monthly check (1st, 12:00 UTC). refresh-data.js skips registry entries whose
# meta.nextDue is still in the future, so 3 / 6 / 12-month cadences share one cron.
# Opens a PR when any baked asset changes; does not push to main.
# Manual: Actions → workflow_dispatch (optional FORCE_REFRESH=1 to ignore nextDue).
on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh all datasets (ignore nextDue)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Refresh registered datasets
        id: refresh
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' && '1' || '' }}
        run: npm run refresh:data

      - name: Validate baked datasets
        run: npm run validate:data

      - name: Read refresh result
        id: result
        run: |
          CHANGED=$(node -e "const r=require('./scripts/.refresh-result.json'); console.log(r.anyChanged ? 'true' : 'false')")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          node -e "const r=require('./scripts/.refresh-result.json'); console.log(JSON.stringify(r,null,2))"

      - name: Create pull request
        if: steps.result.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="chore/refresh-data-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/data js/config/layerConfig.js
          git status
          git commit -m "Refresh baked map datasets (${DATE})."
          git push -u origin HEAD
          node -e '
            const r = require("./scripts/.refresh-result.json");
            const changed = r.results.filter((x) => x.changed);
            const skipped = r.results.filter((x) => x.skipped);
            const lines = [
              "## Summary",
              `- Datasets changed: **${changed.length}**`,
              ...changed.map((b) => {
                const before = b.before.featureCount ?? "n/a";
                const after = b.after.featureCount ?? "n/a";
                return `- **${b.label}**: ${before} → ${after} (version ${b.after.version ?? "n/a"})`;
              }),
              "",
              skipped.length
                ? `- Skipped (not due): ${skipped.map((s) => s.label).join(", ")}`
                : "",
              "",
              "## Test plan",
              "- [ ] Confirm Pages deploy serves new `./data/*` assets",
              "- [ ] Toggle each changed layer; spot-check popups / WMS alignment",
              ""
            ].filter(Boolean);
            require("fs").writeFileSync("/tmp/pr-body.md", lines.join("\n"));
          '
          gh pr create --title "Refresh baked map datasets ${DATE}" --body-file /tmp/pr-body.md
