name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:data
      - run: npm test
      - name: Build
        env:
          # Set these as GitHub Actions repository Variables and/or Secrets so
          # production Stay updated / Feedback work on Pages.
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL || secrets.VITE_CONTACT_EMAIL }}
          VITE_FORMSPREE_WAITLIST: ${{ vars.VITE_FORMSPREE_WAITLIST || secrets.VITE_FORMSPREE_WAITLIST }}
          VITE_FORMSPREE_FEEDBACK: ${{ vars.VITE_FORMSPREE_FEEDBACK || secrets.VITE_FORMSPREE_FEEDBACK }}
          VITE_PLAUSIBLE_DOMAIN: ${{ vars.VITE_PLAUSIBLE_DOMAIN || 'kellybyron2222-dev.github.io' }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
