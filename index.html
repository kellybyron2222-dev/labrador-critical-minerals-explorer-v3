<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Open-source critical minerals exploration platform for Labrador, Canada">
  <title>Critical Minerals Explorer V3 - Labrador, Canada</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-text">
          <h1 class="logo-title">Critical Minerals Explorer</h1>
          <p class="logo-subtitle">Labrador, Canada · V3</p>
        </div>
        <button type="button" id="sidebar-close" class="sidebar-close-btn hidden" aria-label="Close layers panel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <h3 class="nav-section-title">Map Controls</h3>
          <div class="control-buttons">
            <button id="zoom-in" class="control-btn" type="button" title="Zoom In" aria-label="Zoom in">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>
            <button id="zoom-out" class="control-btn" type="button" title="Zoom Out" aria-label="Zoom out">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>
            <button id="reset-view" class="control-btn" type="button" title="Reset View" aria-label="Reset map view">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="layer-groups" class="layer-groups"></div>

        <div class="nav-section">
          <h3 class="nav-section-title">Basemap</h3>
          <div class="basemap-options">
            <button id="basemap-positron" class="basemap-btn active" type="button" data-style="positron" aria-pressed="true">Positron</button>
            <button id="basemap-dark" class="basemap-btn" type="button" data-style="dark" aria-pressed="false">Dark</button>
            <button id="basemap-streets" class="basemap-btn" type="button" data-style="streets" aria-pressed="false">Streets</button>
          </div>
        </div>

        <section class="occ-section" aria-label="Occurrence browser">
          <div class="occ-section-header">
            <h3 class="nav-section-title">Occurrences</h3>
            <span id="occ-list-count" class="occ-panel-count">0</span>
          </div>
          <div class="occ-panel-tools">
            <input id="occ-search" class="occ-search" type="search" placeholder="Search name, commodity, status…" />
            <button type="button" id="occ-clear-filters" class="occ-clear hidden">Clear</button>
          </div>
          <div id="occ-status-filters" class="occ-status-filters"></div>
          <button type="button" id="occ-list-toggle" class="occ-list-toggle collapsed" aria-expanded="false">
            <svg class="occ-list-chevron" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span id="occ-list-toggle-label">Show list</span>
          </button>
          <div id="occ-list-wrap" class="occ-list-wrap collapsed">
            <div id="occ-list" class="occ-list"></div>
          </div>
        </section>
      </nav>

      <div class="sidebar-footer">
        <button type="button" id="settings-open-sidebar" class="settings-sidebar-btn">Settings</button>
        <p class="data-status">Rights: claims, tenure, Indigenous lands, protected areas &amp; land use (off by default). Hard exclusions preset for parks + water supplies. Infrastructure pending — Phase 3.</p>
        <div class="coordinates">
          <span id="coordinates-display">Lat: -- | Lon: --</span>
        </div>
        <div class="zoom-level">
          <span id="zoom-display">Zoom: --</span>
        </div>
      </div>
    </aside>

    <main class="map-container">
      <button type="button" id="sidebar-open" class="map-chrome-btn sidebar-open-btn hidden" aria-label="Open layers panel" aria-expanded="false" aria-controls="sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="17" x2="20" y2="17"/>
        </svg>
        <span>Layers</span>
      </button>
      <button type="button" id="legend-toggle" class="map-chrome-btn legend-toggle-btn hidden" aria-label="Show legend" aria-expanded="false" aria-controls="legend-panel">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <line x1="8" y1="9" x2="16" y2="9"/>
          <line x1="8" y1="13" x2="14" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
        <span>Legend</span>
      </button>
      <button type="button" id="settings-open" class="map-chrome-btn settings-open-btn" aria-label="Open settings" aria-haspopup="dialog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
      <div id="map"></div>
      <div id="legend-panel" class="legend-panel" tabindex="-1"></div>
      <div id="occ-kpi" class="occ-kpi" aria-live="polite"></div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
