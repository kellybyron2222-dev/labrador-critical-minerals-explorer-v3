<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Open-source critical minerals exploration platform for Labrador, Canada">
  <title>Critical Minerals Explorer V3 - Labrador, Canada</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo-title">Critical Minerals Explorer</h1>
        <p class="logo-subtitle">Labrador, Canada · V3</p>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <h3 class="nav-section-title">Map Controls</h3>
          <div class="control-buttons">
            <button id="zoom-in" class="control-btn" title="Zoom In">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>
            <button id="zoom-out" class="control-btn" title="Zoom Out">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
            </button>
            <button id="reset-view" class="control-btn" title="Reset View">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="layer-groups" class="layer-groups"></div>

        <div class="nav-section">
          <h3 class="nav-section-title">Basemap</h3>
          <div class="basemap-options">
            <button id="basemap-positron" class="basemap-btn active" data-style="positron">Positron</button>
            <button id="basemap-dark" class="basemap-btn" data-style="dark">Dark</button>
            <button id="basemap-streets" class="basemap-btn" data-style="streets">Streets</button>
          </div>
        </div>

        <section class="occ-section" aria-label="Occurrence browser">
          <div class="occ-section-header">
            <h3 class="nav-section-title">Occurrences</h3>
            <span id="occ-list-count" class="occ-panel-count">0</span>
          </div>
          <div class="occ-panel-tools">
            <input id="occ-search" class="occ-search" type="search" placeholder="Search name, commodity, status…" />
            <button type="button" id="occ-clear-filters" class="occ-clear hidden">Clear</button>
          </div>
          <div id="occ-status-filters" class="occ-status-filters"></div>
          <button type="button" id="occ-list-toggle" class="occ-list-toggle" aria-expanded="true">
            <svg class="occ-list-chevron" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span id="occ-list-toggle-label">Hide list</span>
          </button>
          <div id="occ-list-wrap" class="occ-list-wrap">
            <div id="occ-list" class="occ-list"></div>
          </div>
        </section>
      </nav>

      <div class="sidebar-footer">
        <p class="data-status">Mining tenures &amp; infrastructure layers pending — demo data removed, awaiting authoritative sources.</p>
        <div class="coordinates">
          <span id="coordinates-display">Lat: -- | Lon: --</span>
        </div>
        <div class="zoom-level">
          <span id="zoom-display">Zoom: --</span>
        </div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
      <div id="legend-panel" class="legend-panel"></div>
      <div id="occ-kpi" class="occ-kpi" aria-live="polite"></div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
